{% extends 'base.html' %}
{% block title %}Log in | My Notes{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-6 col-lg-5">
  <div class="card shadow-sm"><div class="card-body p-4">
    <h1 class="h3 mb-4">Welcome back</h1>
    <form method="post">
      <div class="mb-3"><label class="form-label">Email</label><input class="form-control" type="email" name="email" required autofocus></div>
      <div class="mb-3"><label class="form-label">Password</label><input class="form-control" type="password" name="password" required></div>
      <button class="btn btn-primary w-100">Log in</button>
    </form>
    <p class="text-center small mt-3 mb-0">New here? <a href="{{ url_for('register') }}">Create an account</a></p>
  </div></div>
</div></div>
{% endblock %}
