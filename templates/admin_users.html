{% extends "base.html" %}

{% block title %}Admin - Users{% endblock %}

{% block content %}

<div class="container mt-4">

    <h2 class="mb-4">👥 Registered Users</h2>

    <table class="table table-striped table-bordered">

        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
            </tr>
        </thead>

        <tbody>

            {% for user in users %}

            <tr>
                <td>{{ user.id }}</td>
                <td>{{ user.username }}</td>
                <td>{{ user.email }}</td>
            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
